name: Bug report
description: Report a reproducible problem in the shipping app or source project.
title: "[Bug]: "
labels:
  - bug
assignees:
  - kaiiiichen
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve SudoSodoku. For setup questions, use [Discussions Q&A](https://github.com/SudoSodokuApp/SudoSodoku/discussions/categories/q-a). For a security vulnerability, stop and use [private vulnerability reporting](https://github.com/SudoSodokuApp/SudoSodoku/security/advisories/new).

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the problem and what you expected instead.
      placeholder: I expected… Instead…
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Give the shortest reliable sequence that shows the problem.
      placeholder: |
        1. Open…
        2. Choose…
        3. Observe…
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: SudoSodoku version
      description: Find this on the landing screen or App Store page.
      placeholder: "2.0"
    validations:
      required: true

  - type: input
    id: ios-version
    attributes:
      label: iOS version
      placeholder: "iOS 27.0"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device
      placeholder: "iPhone 17 Pro or iPhone Simulator"
    validations:
      required: true

  - type: dropdown
    id: game-center
    attributes:
      label: Game Center state
      options:
        - Not relevant
        - Signed in
        - Signed out / guest
        - Unknown
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Screenshots, recording, or logs
      description: Add evidence if useful. Remove names, Apple Account details, and other personal information first.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Include frequency, workarounds, or source commit if relevant.

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and discussions for this problem.
          required: true
        - label: I tested the latest App Store version or current `main` branch.
          required: true
        - label: I removed personal and security-sensitive information.
          required: true
